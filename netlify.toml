# BEEN MATH — Netlify 설정
# 서버리스 함수(AI 힌트) 위치를 지정해요.

[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# firebase-admin은 번들 대신 그대로 포함 (esbuild 호환 문제 방지)
[functions.notify]
  external_node_modules = ["firebase-admin"]

# HTML은 항상 최신으로 (브라우저가 옛 코드를 캐시하지 않게)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, max-age=0, must-revalidate"
[[headers]]
  for = "/firebase-init.js"
  [headers.values]
    Cache-Control = "no-cache, max-age=0, must-revalidate"
[[headers]]
  for = "/icon.svg"
  [headers.values]
    Cache-Control = "no-cache, max-age=0, must-revalidate"
