<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>BEEN MATH — 선생님 포털</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#114C56">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:#5B6CF5; --primary-dark:#4F46E5; --primary-light:#EEF2FF; --primary-2:#818CF8;
      --orange:#F97316; --orange-light:#FFF7ED;
      --green:#10B981; --green-light:#ECFDF5;
      --red:#F43F5E; --red-light:#FFF1F2;
      --yellow:#F59E0B; --yellow-light:#FFFBEB;
      --bg:#F4F6FB; --surface:#FFFFFF;
      --text:#0F172A; --text-sub:#334155; --text-muted:#64748B;
      --border:#E8EDF4; --sidebar-w:250px;
      --radius:16px; --radius-sm:11px;
      --shadow:0 1px 2px rgba(16,24,40,.04),0 4px 12px rgba(16,24,40,.05);
      --shadow-md:0 6px 16px -4px rgba(16,24,40,.1),0 4px 8px -4px rgba(16,24,40,.06);
    }
    /* 🌸 계절 테마 — 브랜드(primary) 색만 바뀌고 상태색은 유지 */
    [data-theme="spring"]{ --primary:#E96A9E; --primary-dark:#D5588C; --primary-light:#FDF1F7; --primary-2:#F6A6C6; }
    [data-theme="summer"]{ --primary:#0EA5B7; --primary-dark:#0C8A99; --primary-light:#EBFDFF; --primary-2:#4FD1DE; }
    [data-theme="autumn"]{ --primary:#DD7A2E; --primary-dark:#C2641C; --primary-light:#FFF6EC; --primary-2:#F0A862; }
    [data-theme="winter"]{ --primary:#3F6FD1; --primary-dark:#3257AE; --primary-light:#EEF3FF; --primary-2:#7BA0E8; }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;overflow-x:hidden;-webkit-text-size-adjust:100%}
    img{max-width:100%;height:auto}
    .app-layout{display:flex;min-height:100vh}

    /* SIDEBAR */
    .sidebar{width:var(--sidebar-w);background:#1E293B;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:200;overflow-y:auto}
    .sidebar-logo{padding:22px 20px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
    .sidebar-logo h1{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.5px}
    .sidebar-logo p{font-size:12px;color:rgba(255,255,255,.5);margin-top:3px}
    .sidebar-nav{padding:12px 10px;flex:1}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;color:rgba(255,255,255,.6);font-size:14px;font-weight:500;user-select:none}
    .nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
    .nav-item.active{background:var(--primary);color:#fff;font-weight:600}
    .nav-icon{width:22px;display:inline-flex;align-items:center;justify-content:center;opacity:.9}
    .sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1)}
    .sidebar-footer p{font-size:12px;color:rgba(255,255,255,.4)}

    /* MAIN */
    .main-content{margin-left:var(--sidebar-w);flex:1;min-height:100vh;padding-bottom:48px}
    .page-header{padding:24px 28px 0;margin-bottom:20px}
    .page-title{font-size:22px;font-weight:700;letter-spacing:-.5px}
    .page-subtitle{font-size:13px;color:var(--text-muted);margin-top:4px}
    .section{display:none}
    .section.active{display:block}
    .content-area{padding:0 28px}

    /* CARDS */
    .card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
    .card-title{font-size:15px;font-weight:700;margin-bottom:14px}

    /* STATS */
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
    .stat-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;cursor:pointer;transition:box-shadow .2s}
    .stat-card:hover{box-shadow:var(--shadow-md)}
    .stat-icon{font-size:28px;margin-bottom:8px}
    .stat-value{font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1}
    .stat-label{font-size:12px;color:var(--text-muted);margin-top:4px}

    /* BADGES */
    .badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
    .b-primary{background:var(--primary-light);color:var(--primary)}
    .b-orange{background:var(--orange-light);color:var(--orange)}
    .b-green{background:var(--green-light);color:var(--green)}
    .b-red{background:var(--red-light);color:var(--red)}
    .b-gray{background:#F1F5F9;color:var(--text-muted)}
    .b-yellow{background:var(--yellow-light);color:var(--yellow)}
    .chip{display:inline-block;padding:3px 10px;background:var(--primary-light);color:var(--primary);border-radius:20px;font-size:12px;font-weight:600}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{background:var(--primary-dark)}
    .btn-outline{background:transparent;color:var(--text-sub);border:1.5px solid var(--border)}
    .btn-outline:hover{background:var(--bg)}
    .btn-green{background:var(--green);color:#fff}
    .btn-green:hover{background:#059669}
    .btn-orange{background:var(--orange);color:#fff}
    .btn-orange:hover{background:#EA6C0A}
    .btn-red{background:var(--red);color:#fff}
    .btn-red:hover{background:#DC2626}
    .btn-sm{padding:6px 12px;font-size:12px}
    .btn-row{display:flex;gap:8px;flex-wrap:wrap}

    /* FORMS */
    .form-group{margin-bottom:14px}
    .form-label{display:block;font-size:13px;font-weight:600;color:var(--text-sub);margin-bottom:6px}
    .form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;color:var(--text);font-family:inherit;transition:border-color .15s;background:var(--surface)}
    .form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--primary)}
    .form-textarea{resize:vertical;min-height:80px}
    .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    .form-row-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}

    /* TABLES */
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{padding:10px 12px;background:var(--bg);color:var(--text-muted);font-size:12px;font-weight:700;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
    td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tbody tr:hover td{background:#FAFBFF}

    /* UPLOAD */
    .upload-area{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:14px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg);margin-bottom:12px}
    .upload-area:hover{border-color:var(--primary);background:var(--primary-light)}
    .upload-area .u-icon{font-size:22px;margin-bottom:4px}
    .upload-area p{font-size:12px;color:var(--text-muted)}
    .upload-area input[type=file]{display:none}

    /* ATT BUTTONS */
    .att-btn{padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);transition:all .15s;font-family:inherit}
    .att-btn.sel-p{background:var(--green-light);border-color:var(--green);color:var(--green)}
    .att-btn.sel-l{background:var(--yellow-light);border-color:var(--yellow);color:var(--yellow)}
    .att-btn.sel-a{background:var(--red-light);border-color:var(--red);color:var(--red)}

    /* QUESTION CARDS */
    .q-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
    .q-head{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}

    /* SCHEDULE TABLE */
    .sched-tbl{width:100%;border-collapse:collapse}
    .sched-tbl th{padding:8px 10px;background:var(--bg);font-size:12px;font-weight:700;color:var(--text-muted);border:1px solid var(--border);text-align:center;min-width:80px}
    .sched-tbl td{padding:6px;border:1px solid var(--border);vertical-align:top}
    .sc-cell{background:var(--primary-light);border-radius:6px;padding:6px 8px;margin-bottom:4px}
    .sc-cell.mk{background:var(--orange-light);border:1px solid var(--orange)}
    .sc-name{font-size:12px;font-weight:700;color:var(--primary)}
    .sc-cell.mk .sc-name{color:var(--orange)}
    .sc-time{font-size:11px;color:var(--text-muted)}

    /* REPORT */
    .rp-stat{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;text-align:center}
    .rp-val{font-size:26px;font-weight:800;color:var(--primary);line-height:1}
    .rp-lbl{font-size:12px;color:var(--text-muted);margin-top:6px}

    /* ALERT */
    .alert-card{background:var(--orange-light);border:1.5px solid var(--orange);border-radius:var(--radius);padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .alert-card h4{font-size:13px;font-weight:700;color:var(--orange)}
    .alert-card p{font-size:12px;color:var(--text-sub);margin-top:2px}
    .divider{height:1px;background:var(--border);margin:14px 0}
    .sec-label{font-size:12px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;margin:18px 0 10px}

    /* TOAST */
    .toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
    .toast{background:#1E293B;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;box-shadow:0 4px 12px rgba(0,0,0,.2);animation:tIn .3s ease,tOut .3s ease 2.2s forwards;display:flex;align-items:center;gap:8px}
    .toast.success{background:var(--green)}
    .toast.error{background:var(--red)}
    .toast.warning{background:var(--orange)}
    @keyframes tIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes tOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-10px)}}

    /* MOBILE */
    .mobile-header{display:none;position:fixed;top:0;left:0;right:0;height:56px;background:#1E293B;z-index:160;align-items:center;padding:0 16px;justify-content:space-between}
    .mobile-header h1{font-size:16px;font-weight:800;color:#fff;white-space:nowrap;display:flex;align-items:center}
    .m-menu-btn{font-size:20px;color:rgba(255,255,255,.8);cursor:pointer;padding:8px;border:none;background:transparent}
    .mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150}
    .mob-overlay.open{display:block}
    .sidebar.mob-open{transform:translateX(0)!important}

    @media(max-width:900px){
      .sidebar{transform:translateX(-100%);transition:transform .3s}
      .main-content{margin-left:0;padding-top:calc(56px + env(safe-area-inset-top))}
      .mobile-header{display:flex;height:auto;min-height:56px;padding-top:env(safe-area-inset-top)}
      .page-header{padding:16px 16px 0}
      .content-area{padding:0 16px}
      .stats-grid{grid-template-columns:repeat(2,1fr)}
      .form-row-3,.form-row-4{grid-template-columns:1fr 1fr}
    }
    @media(max-width:520px){
      .stats-grid{grid-template-columns:1fr 1fr}
      .form-row-2,.form-row-3,.form-row-4{grid-template-columns:1fr}
    }
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
    .main-content::-webkit-scrollbar-thumb{background:var(--border)}
  </style>
</head>

<script>
// ================================================================
// DATA
// ================================================================
function loadData(k,d){try{const v=localStorage.getItem('tbm_'+k);return v?JSON.parse(v):d;}catch(e){return d;}}
function saveData(k,v){try{localStorage.setItem('tbm_'+k,JSON.stringify(v));}catch(e){}}

// ===== 반(수업) 목록: Firebase에서 불러옴. 비어있으면 시간표 기준 13개로 자동 생성 =====
const WD_ORDER=['mon','tue','wed','thu','fri','sat','sun'];
const WD_LABEL={mon:'월',tue:'화',wed:'수',thu:'목',fri:'금',sat:'토',sun:'일'};
// 반 요일 — 여러 요일(수·금 특강 등) 지원. 신규는 weekdays 배열, 구버전 문서는 weekday 문자열 → 자동 호환
function clsDays(c){ if(c&&Array.isArray(c.weekdays)&&c.weekdays.length) return c.weekdays.filter(w=>WD_LABEL[w]); return (c&&c.weekday)?[c.weekday]:[]; }
function clsHasDay(c,wd){ return clsDays(c).indexOf(wd)>=0; }
function clsDayLabel(c){ return clsDays(c).map(w=>WD_LABEL[w]).filter(Boolean).join('·'); }
const DEFAULT_CLASSES=[
  {id:'c1', name:'고1T Z2', subject:'공통수학1 유형편',      weekday:'tue', slot:'1부'},
  {id:'c2', name:'고1T B2', subject:'공통수학1 기출편',      weekday:'tue', slot:'2부'},
  {id:'c3', name:'고1T B1', subject:'공통수학1 기출편',      weekday:'wed', slot:'2부'},
  {id:'c4', name:'고1S Z4', subject:'공통수학1 유형편',      weekday:'thu', slot:'1부'},
  {id:'c5', name:'고1S A4', subject:'공통수학1 기출편',      weekday:'thu', slot:'2부'},
  {id:'c6', name:'고1A Z5', subject:'공통수학2 일등급만들기', weekday:'fri', slot:'1부'},
  {id:'c7', name:'고1A A5', subject:'공통수학1 기출편',      weekday:'fri', slot:'2부'},
  {id:'c8', name:'고2 세마', subject:'확통 자체교재',         weekday:'sat', slot:'1부'},
  {id:'c9', name:'고1S B4', subject:'공통수학1 기출편',      weekday:'sat', slot:'2부'},
  {id:'c10',name:'고1T A1', subject:'공통수학1 기출편',      weekday:'sat', slot:'3부'},
  {id:'c11',name:'고1A B5', subject:'공통수학1 기출편',      weekday:'sun', slot:'1부'},
  {id:'c12',name:'고1T A2', subject:'공통수학1 기출편',      weekday:'sun', slot:'2부'},
  {id:'c13',name:'고1T Y3', subject:'공통수학1 유형편',      weekday:'sun', slot:'3부'}
];
let CLASSES=[];
async function loadClasses(){
  let snap=await db.collection('classes').get();
  if(snap.empty){
    const batch=db.batch();
    DEFAULT_CLASSES.forEach((c,i)=>{
      batch.set(db.collection('classes').doc(c.id),{name:c.name,subject:c.subject,weekday:c.weekday,weekdays:[c.weekday],slot:c.slot,startTime:'',endTime:'',type:'정규',order:i});
    });
    await batch.commit();
    snap=await db.collection('classes').get();
  }
  CLASSES=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.order!=null?a.order:99)-(b.order!=null?b.order:99));
}
async function addClassFS(data){ await db.collection('classes').add(data); await loadClasses(); }
async function updateClassFS(id,upd){ await db.collection('classes').doc(id).update(upd); await loadClasses(); }
async function deleteClassFS(id){ await db.collection('classes').doc(id).delete(); await loadClasses(); }

let STUDENTS_CACHE=[];
async function loadStudents(){
  const snap=await db.collection('students').orderBy('name').get();
  STUDENTS_CACHE=snap.docs.map(d=>({id:d.id, ...d.data()}));
}
function getStudents(){return STUDENTS_CACHE;}
// 재원 = 활성. 휴원·퇴원은 명단·출석·숙제·알림·통계에서 제외(기록은 보존)
function studentStatus(s){ return (s&&s.status)||'재원'; }
function isActiveStudent(s){ return studentStatus(s)==='재원'; }
function getActiveStudents(){ return STUDENTS_CACHE.filter(isActiveStudent); }
function getStudentsByClass(cid, includeInactive){
  const inClass=STUDENTS_CACHE.filter(s=>Array.isArray(s.classIds)?s.classIds.includes(cid):s.classId===cid);
  return includeInactive ? inClass : inClass.filter(isActiveStudent);
}
function classNamesOf(s){ return Array.isArray(s.classNames)&&s.classNames.length ? s.classNames : (s.className?[s.className]:[]); }

// 한 제출의 숙제 완성도(%) — 평가했으면 그 값(0~100), 제출만 했으면 100, 미제출/반려는 0
//  → 숙제 제출률을 '얼마나 했는지'로 가중 계산할 때 사용 (직접확인 포함)
function subCompletion(sub){

  if(sub.evalPct===''||sub.evalPct==null) return 100;

}

let _hwDragPid=null;
function hwDragPreset(ev,pid){ _hwDragPid=pid; try{ ev.dataTransfer.setData('text/plain',pid); ev.dataTransfer.effectAllowed='copy'; }catch(e){} }
function hwAllowDrop(ev){ ev.preventDefault(); try{ ev.dataTransfer.dropEffect='copy'; }catch(e){} }
function hwDropOnClass(ev,classId){ ev.preventDefault(); let pid=''; try{ pid=ev.dataTransfer.getData('text/plain'); }catch(e){} pid=pid||_hwDragPid; if(ev.currentTarget){ ev.currentTarget.style.borderColor=''; ev.currentTarget.style.color=''; } applyPreset(pid,classId); }
function applyPreset(pid,classId){
  const p=getHwPresets().find(x=>x.id===pid); if(!p){ showToast('프리셋을 찾을 수 없어요','error'); return; }
  if(hwEditId){ hwEditId=null; rHomework(); }   // 수정 모드였으면 새 과제 폼으로 되돌린 뒤 채움
  const set=(id,v)=>{ const el=document.getElementById(id); if(el) el.value=(v==null?'':v); };
  set('hw-textbook',p.textbook); set('hw-title', p.title||p.textbook); set('hw-content', p.content||'');
  set('hw-pstart', p.probStart||''); set('hw-pend', p.probEnd||''); set('hw-plabel', p.probLabel||''); set('hw-photos', p.maxPhotos||30);
  const st=document.getElementById('hw-start'); if(st && !st.value) st.value=new Date().toISOString().slice(0,10);
  const cls=CLASSES.find(c=>c.id===classId);
  if(classId){ const cs=document.getElementById('hw-cls'); if(cs) cs.value=classId; }
  const anchor=document.getElementById('hw-cls'); if(anchor&&anchor.scrollIntoView) anchor.scrollIntoView({behavior:'smooth',block:'center'});
  showToast(`${cls?cls.name+' · ':''}${p.textbook} 준비됨 — 마감일 정하고 저장하세요`,'success');
}
async function doSaveHwPreset(){
  const textbook=(document.getElementById('hp-textbook').value||'').trim();
  if(!textbook){ showToast('교재명을 입력해주세요','error'); return; }
  const data={ textbook, title:(document.getElementById('hp-title').value||'').trim(),
    probStart:parseInt(document.getElementById('hp-pstart').value)||null, probEnd:parseInt(document.getElementById('hp-pend').value)||null,
    probLabel:(document.getElementById('hp-plabel').value||'').trim()||null, content:'', maxPhotos:30 };
  try{ await saveHwPreset(data); showToast(`📚 "${textbook}" 서랍에 저장`,'success'); rHomework(); }
  catch(e){ showToast('저장 실패(규칙 확인 필요): '+e.message,'error'); }
}
async function doDelHwPreset(id){
  const p=getHwPresets().find(x=>x.id===id);
  if(!confirm(`"${p?p.textbook:''}" 프리셋을 서랍에서 뺄까요?`)) return;
  try{ await deleteHwPreset(id); showToast('서랍에서 뺐어요','warning'); rHomework(); }
  catch(e){ showToast('삭제 실패: '+e.message,'error'); }
}

// 한 복습 제출 상태 — 지정 번호가 모두 사진이 올라오면 done
function revStat(rev,sub){
  const nums=Array.isArray(rev.nums)?rev.nums:[];
  const photos=(sub&&sub.photos)||{};
  const doneNos=nums.filter(n=>photos[n]);
  return { started:doneNos.length>0, doneCnt:doneNos.length, total:nums.length, done:nums.length>0&&doneNos.length===nums.length, photos, checked:!!(sub&&sub.checked) };
}

function ddayBadge(mathDate){
  if(!mathDate) return '';
  const t=new Date(); t.setHours(0,0,0,0);
  const d=new Date(mathDate+'T00:00:00');
  const diff=Math.round((d-t)/86400000);
  if(diff>0) return `<span class="badge b-red">D-${diff}</span>`;
  if(diff===0) return `<span class="badge b-red">D-DAY 🔥</span>`;
  return `<span class="badge b-gray">종료</span>`;
}

  if(Array.isArray(e.mathDates)&&e.mathDates.length) return e.mathDates.filter(m=>m&&m.date);
  if(e.mathDate) return [{label:'수학', date:e.mathDate}];

async function doSaveMock(){
  const title=document.getElementById('mock-title').value.trim();
  const date=document.getElementById('mock-date').value;
  const mode=document.getElementById('mock-mode').value;
  if(!title){ showToast('시험명을 입력해주세요','error'); return; }
  let data={title,date,mode};
  if(mode==='auto'){
    const qs=collectMockKey();
    if(!qs.length){ showToast('정답표 만들기를 눌러 정답을 입력해주세요','error'); return; }
    if(qs.some(q=>!q.answer)){ showToast('모든 문항의 정답을 입력해주세요','error'); return; }
    data.questions=qs; data.maxScore=qs.reduce((a,q)=>a+(q.points||0),0);
  } else {
    data.maxScore=parseInt(document.getElementById('mock-max').value)||100;
    data.questions=[];
  }
  try{
    if(mockEditId){ await updateMockExam(mockEditId,data); mockEditId=null; showToast('모의고사 수정 완료 ✏️','success'); }
    else{ await addMockExam(data); showToast(`"${title}" 모의고사 등록 완료! 학생이 점수를 등록할 수 있어요 📝`,'success'); }

  }catch(e){ showToast('저장 실패: '+e.message,'error'); }
}

async function uploadFile(file, folder){
  const safe=(file.name||'file').replace(/[^\w.\-]/g,'_');
  const ref=firebase.storage().ref(folder+'/'+Date.now()+'_'+Math.random().toString(36).slice(2,7)+'_'+safe);
  await ref.put(file);
  return { url:await ref.getDownloadURL(), name:file.name, size:file.size };
}

function showToast(msg,type=''){
  const icons={success:'✅',error:'❌',warning:'⚠️'};
  const c=document.getElementById('toastContainer');
  const el=document.createElement('div');el.className=`toast ${type}`;
  el.innerHTML=`${icons[type]||'ℹ️'} ${msg}`;c.appendChild(el);
  setTimeout(()=>el.remove(),2600);
}

// ===== AI 시험지 분석 (사진 → 단원·능력·난이도) =====
function fileToBase64(file){ return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result).split(',')[1]);r.onerror=rej;r.readAsDataURL(file);}); }
function compressImage(file,maxDim=1280,q=0.72){ return new Promise((resolve,reject)=>{const img=new Image(),url=URL.createObjectURL(file);img.onload=()=>{let w=img.width,h=img.height;if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}else if(h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);let d;try{d=c.toDataURL('image/jpeg',q);}catch(e){URL.revokeObjectURL(url);return reject(e);}URL.revokeObjectURL(url);resolve({base64:d.split(',')[1],mime:'image/jpeg'});};img.onerror=reject;img.src=url;}); }
let lastAnalysis=null;
async function doAnalyzeExam(){
  const fi=document.getElementById('an-photo');
  if(!fi||!fi.files||!fi.files[0]){ showToast('시험지 사진을 선택해주세요','error'); return; }
  const out=document.getElementById('an-result');
  out.innerHTML='<div style="padding:16px;color:var(--text-muted)">🤖 시험지를 분석하는 중이에요... (10~20초 걸려요)</div>';
  let img; try{ img=await compressImage(fi.files[0]); }catch(e){ try{ img={base64:await fileToBase64(fi.files[0]),mime:fi.files[0].type}; }catch(e2){ out.innerHTML='<div style="color:var(--red)">사진 처리 실패</div>'; return; } }
  try{
    const res=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({imageBase64:img.base64,imageMime:img.mime})});
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||'오류');
    lastAnalysis=data;
    renderAnalysis(data);
  }catch(e){
    const msg=(e&&e.message)||'';
    const fr = /quota|exhausted|resource|rate.?limit|billing/i.test(msg) ? 'AI 무료 사용량을 잠깐 초과했어요. 30초~1분 후 다시 시도해주세요.'
             : /demand|overload|503|UNAVAILABLE|try again/i.test(msg) ? 'AI가 잠시 바빠요. 잠시 후 다시 시도해주세요.'
             : ('분석 실패: '+msg);
    out.innerHTML='<div style="color:var(--text-muted)">⚠️ '+fr+'</div>';
  }
}
function renderAnalysis(data){
  const out=document.getElementById('an-result');
  const probs=(data&&data.problems)||[];
  if(!probs.length){ out.innerHTML='<div style="color:var(--text-muted);padding:12px">'+((data&&data.summary)||'문제를 읽지 못했어요. 더 선명한 사진으로 다시 시도해주세요.')+'</div>'; return; }
  const counts={}; probs.forEach(p=>{const a=p.ability||'기타';counts[a]=(counts[a]||0)+1;});
  const total=probs.length;
  const comp=Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([a,c])=>`<span class="badge b-primary" style="margin:2px">${a} ${Math.round(c/total*100)}%</span>`).join('');
  out.innerHTML=`
    <div style="background:var(--primary-light);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:12px;font-size:13px;color:var(--primary-dark)">📊 ${data.summary||''}</div>
    <div style="margin-bottom:10px">${comp}</div>
    <div class="table-wrap"><table>
      <thead><tr><th>번호</th><th>단원</th><th>요구 능력</th><th>난이도</th></tr></thead>
      <tbody>${probs.map(p=>`<tr><td><strong>${p.no||'-'}</strong></td><td>${p.unit||'-'}</td><td><span class="badge b-primary">${p.ability||'-'}</span></td><td>${p.difficulty||'-'}</td></tr>`).join('')}</tbody>
    </table></div>
    <div style="font-size:11px;color:var(--text-muted);margin:8px 0">⚠️ AI 분석이라 가끔 부정확할 수 있어요. 참고용으로 봐주세요.</div>
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
      <div style="font-weight:700;margin-bottom:8px">📋 이 분석으로 시험 등록 (분석 결과도 함께 저장)</div>
      <div class="form-row-2">
        <div class="form-group">${classSelect('an-cls')}</div>
        <div class="form-group"><input class="form-input" id="an-title" placeholder="시험명 (예: 6월 모의고사)"></div>
      </div>
      <button class="btn btn-green" onclick="doRegisterAnalyzedExam()">✅ 시험으로 등록</button>
    </div>`;
}
async function doRegisterAnalyzedExam(){
  const classId=document.getElementById('an-cls').value;
  const title=document.getElementById('an-title').value.trim();
  if(!classId||!title){ showToast('반과 시험명을 입력해주세요','error'); return; }
  const cls=CLASSES.find(c=>c.id===classId);
  const probs=(lastAnalysis&&lastAnalysis.problems)||[];
  try{
    await saveExam({ classId, className:cls?.name||'', title, range:'', maxScore:100, date:new Date().toISOString().slice(0,10), analysis:probs, analysisSummary:(lastAnalysis&&lastAnalysis.summary)||'' });
    showToast(`"${title}" 시험 등록 완료! 분석도 함께 저장됐어요 📋`,'success');
    rGrades();
  }catch(e){ showToast('등록 실패: '+e.message,'error'); }
}

let clRoomId='';
function rClassroom(){
  const el=document.getElementById('classroomContent'); if(!el) return;
  if(!CLASSES.length){ el.innerHTML='<div class="card" style="text-align:center;padding:30px;color:var(--text-muted)">아직 반이 없어요. 시간표 관리에서 반을 추가하세요.</div>'; return; }
  if(!clRoomId || !CLASSES.find(c=>c.id===clRoomId)) clRoomId=CLASSES[0].id;
  const cls=CLASSES.find(c=>c.id===clRoomId);
  const sts=getStudentsByClass(cls.id);
  const asgns=getAssignments().filter(a=>a.classId===cls.id);
  const hwAsgns=asgns.filter(asnInHwWindow);   // 제출률은 새 교재(hwStart) 이후 숙제만
  const exams=getExams().filter(e=>e.classId===cls.id);
  const esubs=getExamSubs(), allSubs=getSubmissions();
  const today=new Date().toISOString().slice(0,10);
  const rows=sts.map(st=>{
    const mySubs=allSubs.filter(s=>s.studentId===st.id && asgns.some(a=>a.id===s.assignmentId));
    const hwRate=hwAsgns.length?Math.round(hwAsgns.reduce((sum,a)=>sum+subCompletion(mySubs.find(s=>s.assignmentId===a.id)),0)/hwAsgns.length):null;
    const myScores=esubs.filter(s=>s.studentId===st.id && exams.some(e=>e.id===s.examId) && s.score!=null);
    const avg=myScores.length?Math.round(myScores.reduce((a,s)=>a+s.score,0)/myScores.length):null;
    const attInfo=calcAttendance(asgns, subMap(mySubs), today);
    const attRate=attInfo.total?attInfo.rate:null;
    return {st, hwRate, avg, attRate, n:myScores.length};
  });
  rows.sort((a,b)=>((b.avg==null?-1:b.avg)-(a.avg==null?-1:a.avg)));

let hwOpenId=null, hwEditId=null, hwGroupBy='class', hwPeriod='week', hwBoardOpen=false;
// 이번 주 월요일(YYYY-MM-DD)
function thisMonday(){ const n=new Date(); const dow=(n.getDay()+6)%7; n.setDate(n.getDate()-dow); const p=x=>String(x).padStart(2,'0'); return `${n.getFullYear()}-${p(n.getMonth()+1)}-${p(n.getDate())}`; }
// 기간 필터: 이번 주(이번 주 출제 or 마감 임박/이후) / 지난 숙제 / 전체
function hwInWeek(a){ const mon=thisMonday(); const s=a.startDate||a.createdAt||''; const d=a.dueDate||''; return (s&&s>=mon) || (d&&d>=mon); }
function hwPeriodFilter(asgn){ if(hwPeriod==='all') return asgn; const wk=asgn.filter(hwInWeek); return hwPeriod==='week'?wk:asgn.filter(a=>!hwInWeek(a)); }
// 숙제 목록 정렬: 그룹(반/요일) 기준 + 그룹 안에서 최신순
function hwOrder(asgn){
  const M={mon:0,tue:1,wed:2,thu:3,fri:4,sat:5,sun:6};
  const wIdx=c=>(M[c]!=null?M[c]:9);
  const arr=[...asgn];
  arr.sort((a,b)=>{
    const ca=CLASSES.find(c=>c.id===a.classId)||{}, cb=CLASSES.find(c=>c.id===b.classId)||{};
    if(hwGroupBy==='day'){ const d=wIdx(clsDays(ca)[0])-wIdx(clsDays(cb)[0]); if(d) return d; }
    else if(a.classId!==b.classId){ const o=(ca.order||0)-(cb.order||0); if(o) return o; return (a.classId>b.classId?1:-1); }
    return (b.createdAt||b.startDate||'').localeCompare(a.createdAt||a.startDate||'') || (b.id>a.id?1:-1);
  });
  return arr;
}
function hwGroupKey(a){ const c=CLASSES.find(x=>x.id===a.classId)||{}; return hwGroupBy==='day' ? (clsDays(c)[0]||'기타') : a.classId; }
function hwGroupHeader(key){
  if(hwGroupBy==='day'){ return `📅 ${WD_LABEL[key]?WD_LABEL[key]+'요일반':'요일 미지정'}`; }
  const c=CLASSES.find(x=>x.id===key)||{};
  return `📚 ${c.name||'반 미지정'} <span style="color:var(--text-muted);font-weight:400">${clsDayLabel(c)}${c.slot||''}</span>`;
}
// 그동안 쓴 교재 모음 (반 기본교재 + 과거 숙제 교재) — 칩으로 빠른선택
function allTextbooks(){
  const set=new Set();
  CLASSES.forEach(c=>{ if(c.subject) set.add(c.subject); });
  getAssignments().forEach(a=>{ if(a.textbook) set.add(a.textbook); });
  return [...set].slice(0,16);
}

// ✋ 반 미제출 전원 직접확인 (공책 검사) — 배치 처리
async function doCheckAllOffline(aid){
  const a=getAssignments().find(x=>x.id===aid); if(!a) return;
  const subs=getSubsByAssignment(aid), sts=getStudentsByClass(a.classId);
  const missing=sts.filter(st=>!subs.find(s=>s.studentId===st.id));
  if(!missing.length){ showToast('이미 전원 확인됐어요','success'); return; }
  if(!confirm(`미제출 ${missing.length}명을 전원 '직접 확인'으로 처리할까요?\n(공책으로 다 검사했을 때 쓰세요)`)) return;
  try{
    for(const st of missing){
      await db.collection('submissions').add({ assignmentId:aid, assignmentTitle:a.title||'', classId:a.classId||'', className:a.className||'', studentId:st.id, studentName:st.name, photos:[], offline:true, byTeacher:true, submittedAt:new Date().toLocaleString('ko-KR'), checked:true, needsRetry:false, ts:Date.now() });
    }
    await loadSubmissions(); showToast(`${missing.length}명 전원 직접확인 완료 ✋`,'success'); rHomework();
  }catch(e){ showToast('실패: '+e.message,'error'); }
}

// 🔢 오답 방식 숙제 — 학생별 상태
function oapStat(sub){
  const entered = sub && Array.isArray(sub.wrongNos);
  const wn = entered ? sub.wrongNos.map(String) : [];
  const corr = (sub && sub.corrections) || {};
  const redo = (sub && sub.oapRedo) || {};
  const done = entered && (wn.length===0 || wn.every(n=>corr[n] && !redo[n]));
  return { entered, wrongNos:wn, corr, done, doneCnt:wn.filter(n=>corr[n] && !redo[n]).length };
}
function showCorrPhotos(subId){
  const s=getSubmissions().find(x=>x.id===subId);
  const urls = s&&s.corrections ? Object.keys(s.corrections).sort((a,b)=>a-b).map(k=>s.corrections[k]).filter(Boolean) : [];
  showPhotoModal(urls);
}

// "1-5, 8, 10~12" → [1,2,3,4,5,8,10,11,12] (중복 제거·정렬)
function parseNums(str){
  const set=new Set();
  (str||'').split(',').forEach(part=>{
    const m=part.trim().match(/^(\d+)\s*[-~]\s*(\d+)$/);
    if(m){ let a=+m[1],b=+m[2]; if(a>b)[a,b]=[b,a]; for(let i=a;i<=b&&i-a<200;i++) set.add(i); }
    else { const n=parseInt(part,10); if(n>0) set.add(n); }
  });
  return [...set].sort((a,b)=>a-b);
}

// ================================================================
// 🔶 오답 관리 — 학생이 올린 재풀이 사진을 문제별로 확인(맞음)/재오답, 누락분 보완
// ================================================================
let wrongOnlyPending=false;
function rWrong(){
  const asgn=getAssignments().filter(a=>!!((a.probStart&&a.probEnd)||a.probLabel));
  const groups=[]; let waitTotal=0, okTotal=0, redoTotal=0;
  asgn.forEach(a=>{
    const subs=getSubsByAssignment(a.id).filter(s=>Array.isArray(s.wrongNos)&&s.wrongNos.length>0);
    if(!subs.length) return;
    let gWait=0;
    subs.forEach(s=>{ (s.wrongNos||[]).map(String).forEach(n=>{ const corr=(s.corrections||{})[n], ok=(s.oapOk||{})[n], redo=(s.oapRedo||{})[n];
      if(ok) okTotal++; else if(redo) redoTotal++; else if(corr){ waitTotal++; gWait++; } }); });
    groups.push({a,subs,gWait});
  });
  groups.sort((x,y)=>y.gWait-x.gWait);
  const view = wrongOnlyPending ? groups.filter(g=>g.gWait>0) : groups;
  const esc=s=>(s||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
  document.getElementById('wrongContent').innerHTML=`
    <div class="card" style="padding:14px 16px;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:15px;font-weight:800">🔶 오답 현황</span>
        <span class="badge b-yellow">확인 대기 ${waitTotal}</span>
        <span class="badge b-red">재오답 ${redoTotal}</span>
        <span class="badge b-green">확인 완료 ${okTotal}</span>
        <div style="flex:1"></div>
        <button class="btn btn-sm" style="${wrongOnlyPending?'background:var(--primary);color:#fff':'background:var(--bg);color:var(--text-sub)'}" onclick="wrongOnlyPending=!wrongOnlyPending;rWrong()">${wrongOnlyPending?'✓ 확인 대기만':'확인 대기만 보기'}</button>
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:8px">학생이 올린 재풀이 사진을 보고 <strong>맞음</strong>이면 확인, 또 틀렸으면 <strong>재오답</strong>을 누르면 학생이 다시 풀어 올려요. 학생이 빠뜨린 문제는 '보완'으로 추가할 수 있어요.</div>
    </div>
    ${view.length===0?`<div class="card" style="text-align:center;padding:30px;color:var(--text-muted)">${groups.length===0?'아직 등록된 오답이 없어요. 학생이 숙제에서 틀린 문제를 표시하면 여기 모여요.':'확인 대기 중인 오답이 없어요 🎉'}</div>`:''}
    ${view.map(g=>{ const a=g.a; const range=(a.probStart&&a.probEnd)?`${a.probStart}~${a.probEnd}번`:(a.probLabel||'');
      return `<div class="card" style="border-left:4px solid ${g.gWait>0?'var(--orange)':'var(--primary)'};margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:4px">
          <div><span class="chip">${a.className}</span><strong style="margin-left:8px">${a.title}</strong> <span class="badge b-primary">🔢 ${range}</span>${g.gWait>0?` <span class="badge b-yellow">확인 대기 ${g.gWait}</span>`:''}</div>
          ${a.textbook?`<span style="font-size:12px;color:var(--text-muted)">📘 ${a.textbook}</span>`:''}
        </div>
        ${g.subs.map(s=>{ const wn=(s.wrongNos||[]).map(String); const corr=s.corrections||{}, ok=s.oapOk||{}, redo=s.oapRedo||{};
          return `<div style="padding:10px 0;border-top:1px solid var(--border)">
            <div style="font-weight:700;margin-bottom:6px">${s.studentName||'학생'} <span style="font-size:12px;color:var(--text-muted);font-weight:400">· 오답 ${wn.length}개, 확인 ${wn.filter(n=>ok[n]).length}/${wn.length}</span></div>
            <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:flex-start">
              ${wn.map(n=>{ const st = ok[n]?'ok':(redo[n]?'redo':(corr[n]?'wait':'todo'));
                const bg={ok:'var(--green-light)',redo:'#FEE2E2',wait:'#FEF9C3',todo:'var(--bg)'}[st];
                const fg={ok:'var(--green)',redo:'var(--red)',wait:'#854D0E',todo:'var(--text-muted)'}[st];
                let actions='';
                if(st==='wait') actions=`<button class="btn btn-outline btn-sm" style="padding:2px 6px" onclick='showPhotoModal(["${corr[n]}"])'>보기</button><button class="btn btn-green btn-sm" style="padding:2px 6px" onclick="doConfirmWrong('${s.id}','${esc(n)}')">✓맞음</button><button class="btn btn-red btn-sm" style="padding:2px 6px" onclick="doRedoWrong('${s.id}','${esc(n)}')">↻재오답</button>`;
                else if(st==='ok') actions=`<button class="btn btn-outline btn-sm" style="padding:2px 6px" onclick="doUnconfirmWrong('${s.id}','${esc(n)}')">취소</button>`;
                else if(st==='redo') actions=`<span style="font-size:11px;color:var(--red)">다시 풀는 중</span>`;
                else actions=`<span style="font-size:11px;color:var(--text-muted)">사진 대기</span>`;
                return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;border:1px solid var(--border);border-radius:10px;padding:6px 8px;min-width:58px">
                  <span style="font-weight:800;padding:2px 8px;border-radius:7px;background:${bg};color:${fg}">${n}</span>
                  <div style="display:flex;gap:3px;flex-wrap:wrap;justify-content:center">${actions}</div>
                </div>`; }).join('')}
              <div style="display:flex;align-items:center;gap:4px;margin-left:4px">
                <input class="form-input" id="addwrong-${s.id}" placeholder="보완: H45" style="width:90px;padding:5px 8px;font-size:12px">
                <button class="btn btn-outline btn-sm" onclick="doAddWrong('${s.id}')">추가</button>
              </div>
            </div>
          </div>`; }).join('')}
      </div>`; }).join('')}`;
}
async function doConfirmWrong(subId,label){
  const sub=SUBMISSIONS_CACHE.find(s=>s.id===subId); if(!sub) return;
  const ok=Object.assign({},sub.oapOk); ok[label]=true; const redo=Object.assign({},sub.oapRedo); delete redo[label];
  try{ await db.collection('submissions').doc(subId).update({oapOk:ok,oapRedo:redo}); await loadSubmissions(); rWrong(); }
  catch(e){ showToast('처리 실패: '+e.message,'error'); }
}
async function doRedoWrong(subId,label){
  const sub=SUBMISSIONS_CACHE.find(s=>s.id===subId); if(!sub) return;
  const redo=Object.assign({},sub.oapRedo); redo[label]=true; const ok=Object.assign({},sub.oapOk); delete ok[label];
  try{ await db.collection('submissions').doc(subId).update({oapRedo:redo,oapOk:ok}); await loadSubmissions(); rWrong(); showToast('재오답 표시 — 학생이 다시 풀어 올려요','warning'); }
  catch(e){ showToast('처리 실패: '+e.message,'error'); }
}
async function doUnconfirmWrong(subId,label){
  const sub=SUBMISSIONS_CACHE.find(s=>s.id===subId); if(!sub) return;
  const ok=Object.assign({},sub.oapOk); delete ok[label];
  try{ await db.collection('submissions').doc(subId).update({oapOk:ok}); await loadSubmissions(); rWrong(); }
  catch(e){ showToast('처리 실패: '+e.message,'error'); }
}
async function doAddWrong(subId){
  const inp=document.getElementById('addwrong-'+subId); const raw=inp?inp.value:'';
  const labels=raw.split(/[,\s]+/).map(s=>s.trim()).filter(Boolean);
  if(!labels.length){ showToast('추가할 문제 번호를 입력해주세요','warning'); return; }
  const sub=SUBMISSIONS_CACHE.find(s=>s.id===subId); if(!sub) return;
  const wn=[...new Set([...(sub.wrongNos||[]).map(String),...labels])];
  try{ await db.collection('submissions').doc(subId).update({wrongNos:wn}); await loadSubmissions(); rWrong(); showToast(`오답 ${labels.length}개 보완 — 학생이 다시 풀어 올려요`,'success'); }
  catch(e){ showToast('추가 실패: '+e.message,'error'); }
}

// 반려: 제대로 안 한 숙제를 되돌려보냄 → 학생이 다시 제출
async function doReject(sid){
  const reason=prompt('반려 사유를 적어주세요 (학생에게 보여요)\n예: 3·7번 풀이가 없어요. 다시 풀어서 올려주세요.');
  if(reason===null) return;
  try{ await updateSub(sid,{rejected:true, rejectReason:reason.trim(), checked:false}); showToast('숙제를 반려했어요. 학생이 다시 제출할 수 있어요 🔁','warning'); rHomework(); }
  catch(e){ showToast('반려 실패: '+e.message,'error'); }
}
// 미제출 학생을 교실에서 직접 검사 → 확인됨 처리(사진 없는 제출 생성)
async function doCheckOffline(assignmentId, studentId){
  const a=getAssignments().find(x=>x.id===assignmentId), st=getStudents().find(s=>s.id===studentId);
  if(!a||!st) return;
  try{
    await db.collection('submissions').add({
      assignmentId, assignmentTitle:a.title||'', classId:a.classId||'', className:a.className||'',
      studentId:st.id, studentName:st.name, photos:[], offline:true, byTeacher:true,
      submittedAt:new Date().toLocaleString('ko-KR'), checked:true, needsRetry:false, ts:Date.now()
    });
    await loadSubmissions();
    showToast(`${st.name} 직접 검사 완료로 표시했어요 ✓`,'success'); rHomework();
  }catch(e){ showToast('처리 실패: '+e.message,'error'); }
}

function showPhotoModal(urls){

  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:12px;padding:24px;overflow:auto;cursor:zoom-out';

function openSubPhotos(subId){

// 특정 반 학생들의 푸시 토큰 모으기 (알림 켠 학생만)
function classTokens(classId){
  const tk=[];
  getStudents().forEach(s=>{ if(!isActiveStudent(s)) return; const ids=s.classIds||(s.classId?[s.classId]:[]); if(ids.includes(classId)&&Array.isArray(s.fcmTokens)) s.fcmTokens.forEach(t=>{ if(t&&!tk.includes(t)) tk.push(t); }); });
  return tk;
}
// 미제출 독촉 푸시
function doRemind(classId,title){
  const cls=CLASSES.find(c=>c.id===classId);
  showToast('독촉 알림 보내는 중...');
  fetch('/api/notify',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({tokens:classTokens(classId), title:'숙제 제출 알림 ⏰', body:`${cls?.name||''} · "${title}" 아직 제출 안 했어요!`})})
    .then(r=>r.json()).then(j=>{ showToast(j&&j.sent?`독촉 알림 ${j.sent}명 발송 📨`:'알림 켠 학생이 없어요','success'); })
    .catch(()=>showToast('알림 발송 실패','warning'));
}

function numFromScore(s){ const m=String(s==null?'':s).match(/-?\d+(\.\d+)?/); return m?parseFloat(m[0]):null; }  // "94+"→94, "40점대"→40

}

async function updateExam(id,d){ await db.collection('exams').doc(id).update(d); await loadExams(); }
async function deleteExam(id){ await db.collection('exams').doc(id).delete(); await loadExams(); }
async function doSaveExam(){
  const classId=document.getElementById('ex-cls').value,title=document.getElementById('ex-title').value.trim();
  if(!classId||!title){showToast('반과 시험명을 입력해주세요','error');return;}
  const cls=CLASSES.find(c=>c.id===classId);
  const data={classId,className:cls?.name||'',title,range:document.getElementById('ex-range').value.trim(),maxScore:parseInt(document.getElementById('ex-max').value)||100,date:document.getElementById('ex-date').value};
  try{
    if(exEditId){ await updateExam(exEditId,data); exEditId=null; showToast(`"${title}" 시험 수정 완료 ✏️`,'success'); rGrades(); }
    else{ await saveExam(data); showToast(`"${title}" 시험이 등록되었어요! 📋`,'success'); rGrades(); }
  }catch(e){ showToast('저장 실패: '+e.message,'error'); }
}
async function doDelExam(id,title){
  if(!confirm(`"${title}" 시험을 삭제할까요?\n(입력된 점수·피드백도 함께 사라질 수 있어요)`)) return;
  try{ await deleteExam(id); if(exEditId===id)exEditId=null; showToast('시험을 삭제했어요','warning'); rGrades(); }
  catch(e){ showToast('삭제 실패: '+e.message,'error'); }
}
async function doGrade(sid){
  const score=parseInt(document.getElementById('sc-'+sid).value);
  if(isNaN(score)){showToast('점수를 입력해주세요','error');return;}
  try{
    await updateExamSub(sid,{score,comment:document.getElementById('cm-'+sid).value.trim()});
    showToast('채점이 완료되었어요! 🏆','success');rGrades();
  }catch(e){ showToast('저장 실패: '+e.message,'error'); }
}
// ✍️ 점수 직접 입력 (답안지 업로드 없이)
function renderDirectScores(){
  const examId=document.getElementById('ds-exam').value;
  const el=document.getElementById('directScores'); if(!el) return;
  if(!examId){ el.innerHTML=''; return; }
  const exam=getExams().find(e=>e.id===examId); if(!exam){ el.innerHTML=''; return; }
  const sts=getStudentsByClass(exam.classId), esubs=getExamSubs();
  el.innerHTML = sts.length ? `
    <div class="table-wrap"><table>
      <thead><tr><th>학생</th><th>점수 (만점 ${exam.maxScore||100})</th><th>코멘트</th><th></th></tr></thead>
      <tbody>${sts.map(st=>{ const es=esubs.find(s=>s.examId===examId&&s.studentId===st.id); return `
        <tr>
          <td><strong>${st.name}</strong></td>
          <td><input class="form-input" style="width:90px" type="number" id="ds-sc-${st.id}" value="${es&&es.score!=null?es.score:''}" placeholder="0~${exam.maxScore||100}"></td>
          <td><input class="form-input" id="ds-cm-${st.id}" value="${es?(es.comment||''):''}" placeholder="코멘트(선택)"></td>
          <td><button class="btn btn-green btn-sm" onclick="doSaveDirect('${examId}','${st.id}')">저장</button></td>
        </tr>`;}).join('')}</tbody>
    </table></div>
    <button class="btn btn-primary btn-sm" style="margin-top:10px" onclick="doSaveAllDirect('${examId}')">전체 한번에 저장</button>`
  : '<div style="color:var(--text-muted);padding:12px">이 반에 배정된 학생이 없어요</div>';
}
async function upsertExamScore(exam, student, score, comment){
  const existing=getExamSubs().find(s=>s.examId===exam.id && s.studentId===student.id);
  if(existing){ await db.collection('examSubs').doc(existing.id).update({score, comment}); }
  else{ await db.collection('examSubs').add({ examId:exam.id, examTitle:exam.title, classId:exam.classId, className:exam.className, studentId:student.id, studentName:student.name, submittedAt:new Date().toLocaleString('ko-KR'), score, comment, ts:Date.now() }); }
  await loadExamSubs();
}
async function doSaveDirect(examId, studentId){
  const exam=getExams().find(e=>e.id===examId), st=getStudents().find(s=>s.id===studentId);
  const v=document.getElementById('ds-sc-'+studentId).value;
  if(v===''){ showToast('점수를 입력해주세요','error'); return; }
  try{ await upsertExamScore(exam, st, parseInt(v), document.getElementById('ds-cm-'+studentId).value.trim()); showToast(`${st.name} ${parseInt(v)}점 저장 ✓`,'success'); }
  catch(e){ showToast('저장 실패: '+e.message,'error'); }
}
async function doSaveAllDirect(examId){
  const exam=getExams().find(e=>e.id===examId), sts=getStudentsByClass(exam.classId);
  let n=0;
  try{
    for(const st of sts){ const v=document.getElementById('ds-sc-'+st.id).value; if(v==='')continue; await upsertExamScore(exam, st, parseInt(v), document.getElementById('ds-cm-'+st.id).value.trim()); n++; }
    showToast(`${n}명 점수 저장 완료 🏆`,'success'); renderDirectScores();
  }catch(e){ showToast('저장 실패: '+e.message,'error'); }
}

function fbOnExam(){

function perqRowsHtml(wrongStr, perqArr){
  const nos=(wrongStr||'').split(',').map(s=>s.trim()).filter(Boolean);
  if(!nos.length) return '<div style="font-size:12px;color:var(--text-muted);padding:6px">틀린 문항 번호를 입력하고 ‘문항칸 만들기’ 또는 ‘AI 피드백 생성’을 누르세요</div>';
  const map={}; (perqArr||[]).forEach(p=>{ map[String(p.no)]=p.text||p.feedback||''; });
  return nos.map(no=>`<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:8px">
    <div style="flex:0 0 50px;text-align:center;background:#FEE2E2;color:var(--red);border-radius:8px;padding:9px 0;font-weight:700">${no}번</div>
    <textarea class="form-textarea" id="fb-q-${no}" style="flex:1;min-height:52px" placeholder="${no}번: 왜 틀렸고 무엇을 더 연습할지">${map[no]||''}</textarea>
  </div>`).join('');
}
function collectPerq(){
  const out=[]; document.querySelectorAll('[id^="fb-q-"]').forEach(t=>{ out.push({no:t.id.replace('fb-q-',''), text:t.value}); }); return out;
}
function buildPerqRows(){ const w=document.getElementById('fb-wrong').value; document.getElementById('fb-perq').innerHTML=perqRowsHtml(w, collectPerq()); }
function renderFeedbackEditor(){

  const sub=getExamSubs().find(s=>s.examId===examId&&s.studentId===stId);
  const wrong=(sub&&sub.wrongNos)||'', weak=(sub&&sub.weakAbilities&&sub.weakAbilities.join(', '))||'', summary=(sub&&sub.comment)||'', perq=(sub&&sub.perQuestion)||[];
  el.innerHTML=`
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:12px">
      <div style="flex:0 0 110px"><label class="form-label">점수 (만점 ${exam.maxScore||100})</label><input class="form-input" id="fb-score" type="number" value="${sub&&sub.score!=null?sub.score:''}" placeholder="0~${exam.maxScore||100}"></div>

      <button class="btn btn-primary" onclick="doGenFeedback()">🤖 AI 피드백 생성</button>
      <button class="btn btn-outline" onclick="buildPerqRows()">문항칸 만들기</button>
    </div>
    <div class="form-group"><label class="form-label">부족했던 능력 <span style="font-size:11px;color:var(--text-muted)">(쉼표로 구분)</span></label><input class="form-input" id="fb-weak" value="${weak}" placeholder="예: 계산, 그래프활용"></div>
    <div class="form-group"><label class="form-label">시험 총평</label><textarea class="form-textarea" id="fb-summary" style="min-height:72px" placeholder="이 시험에서 어떤 능력이 부족했는지 종합 코멘트">${summary}</textarea></div>
    <label class="form-label">문항별 피드백</label>
    <div id="fb-perq">${perqRowsHtml(wrong, perq)}</div>
    <button class="btn btn-green" style="margin-top:12px" onclick="doSaveFeedback()">💾 성적 리포트 저장</button>`;

async function doGenFeedback(){
  const exam=getExams().find(e=>e.id===document.getElementById('fb-exam').value);
  const wrong=document.getElementById('fb-wrong').value.trim();
  if(!exam){ showToast('시험을 선택하세요','error'); return; }
  if(!wrong){ showToast('틀린 문항 번호를 입력해주세요','error'); return; }
  showToast('AI가 피드백을 만드는 중...');
  try{
    const r=await fetch('/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({examTitle:exam.title,range:exam.range||'',maxScore:exam.maxScore||100,wrongNos:wrong})});
    const j=await r.json();
    if(j.error){ showToast('AI 오류: '+j.error,'error'); return; }
    if(Array.isArray(j.weakAbilities)) document.getElementById('fb-weak').value=j.weakAbilities.join(', ');
    if(j.summary) document.getElementById('fb-summary').value=j.summary;
    document.getElementById('fb-perq').innerHTML=perqRowsHtml(wrong, (j.perQuestion||[]).map(p=>({no:p.no, text:p.feedback||p.advice||p.reason||p.text})));
    showToast('AI 초안 완성! 다듬어서 저장하세요 ✍️','success');
  }catch(e){ showToast('생성 실패: '+e.message,'error'); }
}
async function doSaveFeedback(){
  const examId=document.getElementById('fb-exam').value, stId=document.getElementById('fb-student').value;
  const exam=getExams().find(e=>e.id===examId), st=getStudents().find(s=>s.id===stId);
  if(!exam||!st){ showToast('시험·학생을 선택하세요','error'); return; }
  const scoreV=document.getElementById('fb-score').value;
  const payload={
    wrongNos:document.getElementById('fb-wrong').value.trim(),
    weakAbilities:document.getElementById('fb-weak').value.split(',').map(s=>s.trim()).filter(Boolean),
    comment:document.getElementById('fb-summary').value.trim(),
    perQuestion:collectPerq().filter(p=>p.text.trim())
  };
  if(scoreV!=='') payload.score=parseInt(scoreV);
  try{
    const existing=getExamSubs().find(s=>s.examId===examId&&s.studentId===stId);
    if(existing){ await db.collection('examSubs').doc(existing.id).update(payload); }
    else{ await db.collection('examSubs').add({ examId:exam.id, examTitle:exam.title, classId:exam.classId, className:exam.className, studentId:st.id, studentName:st.name, submittedAt:new Date().toLocaleString('ko-KR'), score:scoreV!==''?parseInt(scoreV):null, ts:Date.now(), ...payload }); }
    await loadExamSubs();
    showToast(`${st.name} 성적 리포트 저장 완료 📊`,'success'); renderFeedbackEditor();
  }catch(e){ showToast('저장 실패: '+e.message,'error'); }
}

function rQuestions(){
  const qs=getQuestions();
  const pending=qs.filter(q=>q.status!=='answered'),answered=qs.filter(q=>q.status==='answered');
  const qBadge=s=>({answered:'<span class="badge b-green">답변 완료</span>',ai_draft:'<span class="badge b-primary">AI 초안</span>',pending:'<span class="badge b-gray">답변 대기</span>'}[s]||'');
  function qCard(q){return`
    <div class="q-card">
      <div class="q-head">
        <div><strong>${q.studentName}</strong><span class="chip" style="margin-left:6px">${q.className}</span><span style="margin-left:8px;font-size:12px;color:var(--text-muted)">📖 ${q.textbook} p.${q.page} ${q.number}</span></div>
        <div style="display:flex;align-items:center;gap:8px"><span style="font-size:11px;color:var(--text-muted)">${q.createdAt}</span>${qBadge(q.status)}</div>
      </div>
      ${q.aiHint?`<div style="padding:14px 18px;background:#EFF6FF;border-bottom:1px solid #BFDBFE"><div style="font-size:12px;font-weight:700;color:#2563EB;margin-bottom:6px">🤖 AI 힌트 (데모)</div><p style="font-size:13px;color:#1E40AF;line-height:1.7">${q.aiHint}</p></div>`:''}
      ${q.teacherAnswer?`<div style="padding:14px 18px;background:var(--green-light)"><div style="font-size:12px;font-weight:700;color:var(--green);margin-bottom:6px">👩‍🏫 내 답변</div><p style="font-size:13px;color:#065F46;line-height:1.7">${q.teacherAnswer}</p></div>`:`
        <div style="padding:14px 18px;background:var(--bg)">
          <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:8px">답변 작성</div>
          <textarea class="form-textarea" id="ans-${q.id}" style="min-height:70px" placeholder="학생에게 답변을 남겨주세요..."></textarea>
          <button class="btn btn-green btn-sm" style="margin-top:8px" onclick="doAns('${q.id}')">답변 저장</button>
        </div>`}
    </div>`;}
  document.getElementById('questionsContent').innerHTML=`
    ${pending.length?`<div class="sec-label" style="color:var(--red)">⚠️ 답변 필요 (${pending.length})</div>${pending.map(qCard).join('')}`:''}
    ${answered.length?`<div class="sec-label">✅ 답변 완료 (${answered.length})</div>${answered.map(qCard).join('')}`:''}
    ${!qs.length?'<div class="card" style="text-align:center;padding:40px;color:var(--text-muted)">질문이 없어요 🎉</div>':''}`;
}
async function doAns(qid){
  const ans=document.getElementById('ans-'+qid)?.value.trim();
  if(!ans){showToast('답변을 입력해주세요','error');return;}
  try{ await answerQ(qid,ans); showToast('답변이 저장되었어요! 💬','success'); rQuestions(); }
  catch(e){ showToast('저장 실패: '+e.message,'error'); }
}

const TYPE_BADGE={'정규':'b-primary','보강':'b-orange','특강':'b-yellow'};
// 운영기간 있는 반(특강 등)은 기간 내에만 시간표에 표시
function isClassActive(c, today){
  today=today||new Date().toISOString().slice(0,10);
  if(c.endDate && today>c.endDate) return false;
  if(c.startDate && today<c.startDate) return false;
  return true;
}
function classPeriodStatus(c, today){
  today=today||new Date().toISOString().slice(0,10);
  if(!c.startDate && !c.endDate) return '';
  if(c.endDate && today>c.endDate) return '<span class="badge b-gray">종료</span>';
  if(c.startDate && today<c.startDate) return '<span class="badge b-yellow">예정</span>';
  return '<span class="badge b-green">진행중</span>';
}

// 🪄 시험 전날 직보 자동 생성 — 수학시험 전날: 그날 학교시험 있으면 2시, 없으면 5시
async function doAutoMakeups(){
  const today=new Date().toISOString().slice(0,10);
  const pad=n=>String(n).padStart(2,'0');
  const plans=[];
  getSchoolExams().forEach(e=>{
    examMathDates(e).forEach(m=>{
      if(!m.date || m.date<today) return;
      const d=new Date(m.date+'T00:00:00'); d.setDate(d.getDate()-1);
      const mkDate=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
      if(mkDate<today) return;
      const hadExam=!!(e.startDate&&e.endDate&&mkDate>=e.startDate&&mkDate<=e.endDate);
      plans.push({date:mkDate, school:e.school, grade:e.grade||'', label:m.label||'수학', time:hadExam?'14:00~':'17:00~', hadExam});
    });
  });
  if(!plans.length){ showToast('자동 생성할 다가오는 수학 시험이 없어요','warning'); return; }
  if(!confirm(`다가오는 수학시험 ${plans.length}건의 전날 직보를 자동 생성할까요?\n· 그날 학교시험 O → 2시\n· 그날 학교시험 X → 5시\n(같은 학교·같은 날짜가 이미 있으면 건너뜀)`)) return;
  let created=0, skipped=0;
  for(const p of plans){
    const dup=getMakeups().some(x=>x.date===p.date && (x.school===p.school || (x.className||'').includes(p.school)));
    if(dup){ skipped++; continue; }
    await db.collection('makeups').add({
      date:p.date, className:`${p.school}${p.grade?' '+p.grade:''} 직보`, school:p.school,
      time:p.time, note:`${p.label} 시험 전날 직보 ${p.hadExam?'(그날 시험O→2시)':'(그날 시험X→5시)'}`,
      auto:true, ts:Date.now()
    });
    created++;
  }
  await loadMakeups();
  showToast(`🪄 직보 ${created}건 자동 생성!${skipped?` (중복 ${skipped}건 건너뜀)`:''}`,'success'); rSchedule();
}

let rpStId='';
// 출석 자동 집계: 수업일=숙제 마감일(dueDate), 그날 숙제 중 '확인 완료(checked)'한 게 있으면 출석
function calcAttendance(assignments, subByAsn, today){
  const sessions = new Map();
  assignments.forEach(a=>{
    const d = a.dueDate || a.startDate || a.createdAt || '';
    if(!d || d > today) return;
    const sub = subByAsn[a.id];
    const checked = !!(sub && sub.checked);
    let cur = sessions.get(d);
    if(!cur){ cur = { date:d, present:false }; sessions.set(d, cur); }
    if(checked) cur.present = true;
  });
  const list = [...sessions.values()].filter(s => s.date < today || s.present);
  const total = list.length, present = list.filter(s=>s.present).length;
  return { total, present, rate: total?Math.round(present/total*100):0 };
}
function subMap(subs){ const m={}; subs.forEach(s=>{ if(s.assignmentId) m[s.assignmentId]=s; }); return m; }
// 제출률 집계 시작일(hwStart): 새 교재 시작 시 리셋 — 이 날짜(출제일 기준) 이후 숙제만 제출률에 반영
function classHwStart(classId){ const c=CLASSES.find(x=>x.id===classId); return (c&&c.hwStart)||''; }
function asnInHwWindow(a){ const st=classHwStart(a.classId); if(!st) return true; const d=a.startDate||a.createdAt||a.dueDate||''; return !d || d>=st; }
function studentStats(st){
  if(!st) return {hwRate:'-',retryRate:'-',attRate:'-',recent:'-'};
  const myClassIds=st.classIds||(st.classId?[st.classId]:[]);
  const myAsgn=getAssignments().filter(a=>myClassIds.includes(a.classId));
  const myAsgnHw=myAsgn.filter(asnInHwWindow);   // 제출률은 새 교재(hwStart) 이후만
  const mySubs=getSubmissions().filter(s=>s.studentId===st.id);
  const hwRate=myAsgnHw.length?Math.round(myAsgnHw.reduce((sum,a)=>sum+subCompletion(mySubs.find(s=>s.assignmentId===a.id)),0)/myAsgnHw.length)+'%':'-';
  const retrySubs=mySubs.filter(s=>s.needsRetry).length;
  const retryRate=mySubs.length&&retrySubs?Math.round((1-retrySubs/mySubs.length)*100)+'%':(mySubs.length?'100%':'-');
  const attInfo=calcAttendance(myAsgn, subMap(mySubs), new Date().toISOString().slice(0,10));
  const attRate=attInfo.total?attInfo.rate+'%':'-';
  const myScores=getExamSubs().filter(s=>s.studentId===st.id&&s.score!=null).sort((a,b)=>(b.ts||0)-(a.ts||0));
  const recent=myScores.length?myScores[0].score+'점':'-';
  return {hwRate,retryRate,attRate,recent};
}
function rReport(){
  const sts=getStudents(),reports=getReports(),sel=sts.find(s=>s.id===rpStId),existing=reports.find(r=>r.studentId===rpStId);
  const stat=studentStats(sel);
  document.getElementById('reportContent').innerHTML=`
    <div class="card">
      <div class="card-title">📊 학생별 리포트 작성</div>
      <div class="form-group">
        <label class="form-label">학생 선택</label>
        <select class="form-select" onchange="rpStId=this.value;rReport()" style="max-width:300px">
          <option value="">학생을 선택하세요</option>
          ${sts.map(s=>`<option value="${s.id}" ${s.id===rpStId?'selected':''}>${s.name} (${classNamesOf(s).join(', ')||'반 미배정'})</option>`).join('')}
        </select>
      </div>
    </div>
    ${sel?`
      <div class="card">
        <div class="card-title">📈 ${sel.name} 학습 지표 (자동 계산)</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">
          <div class="rp-stat"><div class="rp-val">${stat.hwRate}</div><div class="rp-lbl">숙제 제출률</div></div>
          <div class="rp-stat"><div class="rp-val">${stat.retryRate}</div><div class="rp-lbl">오답 완료율</div></div>
          <div class="rp-stat"><div class="rp-val">${stat.attRate}</div><div class="rp-lbl">출석률</div></div>
          <div class="rp-stat"><div class="rp-val">${stat.recent}</div><div class="rp-lbl">최근 성적</div></div>
        </div>
        <div class="form-group"><label class="form-label">혜빈쌤 코멘트 ✍️</label><textarea class="form-textarea" id="rp-comment" style="min-height:120px" placeholder="학생에게 남기는 종합 피드백...">${existing?.teacherComment||''}</textarea></div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="doSaveRp()">💾 리포트 완성하기</button>
        </div>
        <div style="margin-top:10px;font-size:12px;color:var(--text-muted)">💡 리포트 완성 시 학생 포털 "학습 리포트" 탭에 반영됩니다.</div>
      </div>
      ${existing?`<div class="card" style="background:var(--green-light);border:1px solid var(--green)"><div class="card-title" style="color:var(--green)">✅ 저장된 리포트</div><p style="font-size:13px;color:#065F46;line-height:1.7">${existing.teacherComment}</p><div style="font-size:11px;color:var(--green);margin-top:8px">저장일: ${existing.savedAt}</div></div>`:''}`:''}`;
}
async function doSaveRp(){
  if(!rpStId){showToast('학생을 선택해주세요','error');return;}
  const comment=document.getElementById('rp-comment')?.value.trim();
  if(!comment){showToast('코멘트를 입력해주세요','error');return;}
  try{ await saveReport({studentId:rpStId,teacherComment:comment,savedAt:new Date().toLocaleString('ko-KR')}); showToast('리포트가 저장되었어요! 학생 포털에 반영됩니다 📊','success'); rReport(); }
  catch(e){ showToast('저장 실패: '+e.message,'error'); }
}

// 로그아웃 — Firebase 로그아웃 + 세션 지우고 로그인 페이지로
function logout(){
  if(!confirm('로그아웃 할까요?'))return;
  ['bm_role','bm_email','bm_uid','bm_demo','bm_studentId','bm_studentName','bm_classId','bm_classIds','bm_className'].forEach(k=>localStorage.removeItem(k));
  location.href='index.html';
}

// ===== 3개월 자동삭제 (하루 1회) — 사진 비용 절약 =====
// 사진: 3개월 지난 제출/답안지 사진을 Storage에서 삭제
// 기록: 3개월 지난 출석·질문·상담 문서 삭제 (성적 점수는 보존)
async function pruneOldFirebase(){
  const today=new Date().toISOString().slice(0,10);
  if(localStorage.getItem('bm_lastPrune')===today) return;  // 하루 1회만
  const cutoff=Date.now() - 92*24*60*60*1000;  // 약 3개월
  const delPhotos=async (urls)=>{ if(Array.isArray(urls)) for(const u of urls){ try{ await firebase.storage().refFromURL(u).delete(); }catch(e){} } };
  try{
    // 숙제 제출: 사진 + 문서 삭제
    const subs=await db.collection('submissions').where('ts','<',cutoff).get();
    for(const d of subs.docs){ await delPhotos(d.data().photos); await d.ref.delete(); }
    // 답안지: 사진만 삭제(점수는 보존)
    const es=await db.collection('examSubs').where('ts','<',cutoff).get();
    for(const d of es.docs){ const s=d.data(); if(Array.isArray(s.photos)&&s.photos.length){ await delPhotos(s.photos); await d.ref.update({photos:[]}); } }
    // 날짜 기록: 출석·질문·상담 문서 삭제
    for(const col of ['attendance','questions','consultations']){
      const snap=await db.collection(col).where('ts','<',cutoff).get();
      for(const d of snap.docs){ await d.ref.delete(); }
    }
    // 🚪 퇴원 6개월(183일) 경과 학생 자동 정리 — 학생 문서 + studentId로 연결된 기록/사진 삭제
    const leaveCut=new Date(Date.now()-183*24*60*60*1000).toISOString().slice(0,10);
    for(const s of STUDENTS_CACHE){
      if(studentStatus(s)!=='퇴원' || !s.statusDate || s.statusDate>leaveCut) continue;
      for(const col of ['submissions','examSubs','reviewSubs','naesin','questions','mockSubs']){
        try{ const snap=await db.collection(col).where('studentId','==',s.id).get();
          for(const d of snap.docs){ const dt=d.data(); await delPhotos(dt.photos); await delPhotos(dt.retryPhotos); await d.ref.delete(); } }
        catch(e){}
      }
      try{ await db.collection('students').doc(s.id).delete(); }catch(e){}
    }
    await loadStudents();
    localStorage.setItem('bm_lastPrune', today);
  }catch(e){ /* 색인 준비 전이면 조용히 패스 */ }
}

  rDashboard();

  if(location.search.indexOf('quick=hw')>=0) setTimeout(openQuickHw, 300);
}
