<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BEEN MATH — 선생님 포털</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#114C56">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:#5B6CF5; --primary-dark:#4F46E5; --primary-light:#EEF2FF;
      --orange:#F97316; --orange-light:#FFF7ED;
      --green:#10B981; --green-light:#ECFDF5;
      --red:#F43F5E; --red-light:#FFF1F2;
      --yellow:#F59E0B; --yellow-light:#FFFBEB;
      --bg:#F1F5F9; --surface:#FFFFFF;
      --text:#0F172A; --text-sub:#334155; --text-muted:#64748B;
      --border:#E2E8F0; --sidebar-w:250px;
      --radius:12px; --radius-sm:8px;
      --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
      --shadow-md:0 4px 6px -1px rgba(0,0,0,.1);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
    .app-layout{display:flex;min-height:100vh}

    /* SIDEBAR */
    .sidebar{width:var(--sidebar-w);background:#1E293B;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:200;overflow-y:auto}
    .sidebar-logo{padding:22px 20px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
    .sidebar-logo h1{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.5px}
    .sidebar-logo p{font-size:12px;color:rgba(255,255,255,.5);margin-top:3px}
    .sidebar-nav{padding:12px 10px;flex:1}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;color:rgba(255,255,255,.6);font-size:14px;font-weight:500;user-select:none}
    .nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
    .nav-item.active{background:var(--primary);color:#fff;font-weight:600}
    .nav-icon{width:22px;display:inline-flex;align-items:center;justify-content:center;opacity:.9}
    .sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1)}
    .sidebar-footer p{font-size:12px;color:rgba(255,255,255,.4)}

    /* MAIN */
    .main-content{margin-left:var(--sidebar-w);flex:1;min-height:100vh;padding-bottom:48px}
    .page-header{padding:24px 28px 0;margin-bottom:20px}
    .page-title{font-size:22px;font-weight:700;letter-spacing:-.5px}
    .page-subtitle{font-size:13px;color:var(--text-muted);margin-top:4px}
    .section{display:none}
    .section.active{display:block}
    .content-area{padding:0 28px}

    /* CARDS */
    .card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
    .card-title{font-size:15px;font-weight:700;margin-bottom:14px}

    /* STATS */
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
    .stat-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;cursor:pointer;transition:box-shadow .2s}
    .stat-card:hover{box-shadow:var(--shadow-md)}
    .stat-icon{font-size:28px;margin-bottom:8px}
    .stat-value{font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1}
    .stat-label{font-size:12px;color:var(--text-muted);margin-top:4px}

    /* BADGES */
    .badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
    .b-primary{background:var(--primary-light);color:var(--primary)}
    .b-orange{background:var(--orange-light);color:var(--orange)}
    .b-green{background:var(--green-light);color:var(--green)}
    .b-red{background:var(--red-light);color:var(--red)}
    .b-gray{background:#F1F5F9;color:var(--text-muted)}
    .b-yellow{background:var(--yellow-light);color:var(--yellow)}
    .chip{display:inline-block;padding:3px 10px;background:var(--primary-light);color:var(--primary);border-radius:20px;font-size:12px;font-weight:600}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{background:var(--primary-dark)}
    .btn-outline{background:transparent;color:var(--text-sub);border:1.5px solid var(--border)}
    .btn-outline:hover{background:var(--bg)}
    .btn-green{background:var(--green);color:#fff}
    .btn-green:hover{background:#059669}
    .btn-orange{background:var(--orange);color:#fff}
    .btn-orange:hover{background:#EA6C0A}
    .btn-red{background:var(--red);color:#fff}
    .btn-red:hover{background:#DC2626}
    .btn-sm{padding:6px 12px;font-size:12px}
    .btn-row{display:flex;gap:8px;flex-wrap:wrap}

    /* FORMS */
    .form-group{margin-bottom:14px}
    .form-label{display:block;font-size:13px;font-weight:600;color:var(--text-sub);margin-bottom:6px}
    .form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;color:var(--text);font-family:inherit;transition:border-color .15s;background:var(--surface)}
    .form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--primary)}
    .form-textarea{resize:vertical;min-height:80px}
    .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    .form-row-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}

    /* TABLES */
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{padding:10px 12px;background:var(--bg);color:var(--text-muted);font-size:12px;font-weight:700;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
    td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tbody tr:hover td{background:#FAFBFF}

    /* UPLOAD */
    .upload-area{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:14px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg);margin-bottom:12px}
    .upload-area:hover{border-color:var(--primary);background:var(--primary-light)}
    .upload-area .u-icon{font-size:22px;margin-bottom:4px}
    .upload-area p{font-size:12px;color:var(--text-muted)}
    .upload-area input[type=file]{display:none}

    /* ATT BUTTONS */
    .att-btn{padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);transition:all .15s;font-family:inherit}
    .att-btn.sel-p{background:var(--green-light);border-color:var(--green);color:var(--green)}
    .att-btn.sel-l{background:var(--yellow-light);border-color:var(--yellow);color:var(--yellow)}
    .att-btn.sel-a{background:var(--red-light);border-color:var(--red);color:var(--red)}

    /* QUESTION CARDS */
    .q-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
    .q-head{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}

    /* SCHEDULE TABLE */
    .sched-tbl{width:100%;border-collapse:collapse}
    .sched-tbl th{padding:8px 10px;background:var(--bg);font-size:12px;font-weight:700;color:var(--text-muted);border:1px solid var(--border);text-align:center;min-width:80px}
    .sched-tbl td{padding:6px;border:1px solid var(--border);vertical-align:top}
    .sc-cell{background:var(--primary-light);border-radius:6px;padding:6px 8px;margin-bottom:4px}
    .sc-cell.mk{background:var(--orange-light);border:1px solid var(--orange)}
    .sc-name{font-size:12px;font-weight:700;color:var(--primary)}
    .sc-cell.mk .sc-name{color:var(--orange)}
    .sc-time{font-size:11px;color:var(--text-muted)}

    /* REPORT */
    .rp-stat{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;text-align:center}
    .rp-val{font-size:26px;font-weight:800;color:var(--primary);line-height:1}
    .rp-lbl{font-size:12px;color:var(--text-muted);margin-top:6px}

    /* ALERT */
    .alert-card{background:var(--orange-light);border:1.5px solid var(--orange);border-radius:var(--radius);padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .alert-card h4{font-size:13px;font-weight:700;color:var(--orange)}
    .alert-card p{font-size:12px;color:var(--text-sub);margin-top:2px}
    .divider{height:1px;background:var(--border);margin:14px 0}
    .sec-label{font-size:12px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;margin:18px 0 10px}

    /* TOAST */
    .toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
    .toast{background:#1E293B;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;box-shadow:0 4px 12px rgba(0,0,0,.2);animation:tIn .3s ease,tOut .3s ease 2.2s forwards;display:flex;align-items:center;gap:8px}
    .toast.success{background:var(--green)}
    .toast.error{background:var(--red)}
    .toast.warning{background:var(--orange)}
    @keyframes tIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes tOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-10px)}}

    /* MOBILE */
    .mobile-header{display:none;position:fixed;top:0;left:0;right:0;height:56px;background:#1E293B;z-index:160;align-items:center;padding:0 16px;justify-content:space-between}
    .mobile-header h1{font-size:16px;font-weight:800;color:#fff}
    .m-menu-btn{font-size:20px;color:rgba(255,255,255,.8);cursor:pointer;padding:8px;border:none;background:transparent}
    .mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150}
    .mob-overlay.open{display:block}
    .sidebar.mob-open{transform:translateX(0)!important}

    @media(max-width:900px){
      .sidebar{transform:translateX(-100%);transition:transform .3s}
      .main-content{margin-left:0;padding-top:56px}
      .mobile-header{display:flex}
      .page-header{padding:16px 16px 0}
      .content-area{padding:0 16px}
      .stats-grid{grid-template-columns:repeat(2,1fr)}
      .form-row-3,.form-row-4{grid-template-columns:1fr 1fr}
    }
    @media(max-width:520px){
      .stats-grid{grid-template-columns:1fr 1fr}
      .form-row-2,.form-row-3,.form-row-4{grid-template-columns:1fr}
    }
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
    .main-content::-webkit-scrollbar-thumb{background:var(--border)}
  </style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>

<header class="mobile-header">
  <h1><img src="icon.svg" alt="" style="height:24px;vertical-align:-6px;border-radius:6px;margin-right:5px">BEEN MATH 관리자</h1>
  <button class="m-menu-btn" onclick="toggleMob()">☰</button>
</header>
<div class="mob-overlay" id="mobOverlay" onclick="toggleMob()"></div>

<div class="app-layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <h1><img src="icon.svg" alt="" style="height:26px;vertical-align:-6px;border-radius:6px;margin-right:6px">BEEN MATH</h1>
      <p>선생님 관리자 포털</p>
    </div>
    <div class="sidebar-nav" id="sidebarNav"></div>
    <div class="sidebar-footer">
      <p style="margin-bottom:8px">👩‍🏫 혜빈쌤 로그인 중</p>
      <button onclick="logout()" style="width:100%;padding:8px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">🚪 로그아웃</button>
    </div>
  </nav>

  <main class="main-content">
    <div class="section active" id="sec-dashboard">
      <div class="page-header"><div class="page-title">대시보드</div><div class="page-subtitle" id="todayDate"></div></div>
      <div class="content-area" id="dashboardContent"></div>
    </div>
    <div class="section" id="sec-students">
      <div class="page-header"><div class="page-title">학생 관리</div></div>
      <div class="content-area" id="studentsContent"></div>
    </div>
    <div class="section" id="sec-homework">
      <div class="page-header"><div class="page-title">숙제 관리</div></div>
      <div class="content-area" id="homeworkContent"></div>
    </div>
    <div class="section" id="sec-attendance">
      <div class="page-header"><div class="page-title">출석 관리</div></div>
      <div class="content-area" id="attendanceContent"></div>
    </div>
    <div class="section" id="sec-grades">
      <div class="page-header"><div class="page-title">성적 관리</div></div>
      <div class="content-area" id="gradesContent"></div>
    </div>
    <div class="section" id="sec-questions">
      <div class="page-header"><div class="page-title">질문 관리</div></div>
      <div class="content-area" id="questionsContent"></div>
    </div>
    <div class="section" id="sec-videos">
      <div class="page-header"><div class="page-title">수업 영상 관리</div></div>
      <div class="content-area" id="videosContent"></div>
    </div>
    <div class="section" id="sec-materials">
      <div class="page-header"><div class="page-title">자료실 관리</div></div>
      <div class="content-area" id="materialsContent"></div>
    </div>
    <div class="section" id="sec-schedule">
      <div class="page-header"><div class="page-title">시간표 관리</div></div>
      <div class="content-area" id="scheduleContent"></div>
    </div>
    <div class="section" id="sec-consultation">
      <div class="page-header"><div class="page-title">상담 관리</div></div>
      <div class="content-area" id="consultationContent"></div>
    </div>
    <div class="section" id="sec-report">
      <div class="page-header"><div class="page-title">리포트</div></div>
      <div class="content-area" id="reportContent"></div>
    </div>
  </main>
</div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-init.js"></script>

<script>
// ================================================================
// DATA
// ================================================================
function loadData(k,d){try{const v=localStorage.getItem('tbm_'+k);return v?JSON.parse(v):d;}catch(e){return d;}}
function saveData(k,v){try{localStorage.setItem('tbm_'+k,JSON.stringify(v));}catch(e){}}

// ===== 반(수업) 목록: Firebase에서 불러옴. 비어있으면 시간표 기준 13개로 자동 생성 =====
const WD_ORDER=['mon','tue','wed','thu','fri','sat','sun'];
const WD_LABEL={mon:'월',tue:'화',wed:'수',thu:'목',fri:'금',sat:'토',sun:'일'};
const DEFAULT_CLASSES=[
  {id:'c1', name:'고1T Z2', subject:'공통수학1 유형편',      weekday:'tue', slot:'1부'},
  {id:'c2', name:'고1T B2', subject:'공통수학1 기출편',      weekday:'tue', slot:'2부'},
  {id:'c3', name:'고1T B1', subject:'공통수학1 기출편',      weekday:'wed', slot:'2부'},
  {id:'c4', name:'고1S Z4', subject:'공통수학1 유형편',      weekday:'thu', slot:'1부'},
  {id:'c5', name:'고1S A4', subject:'공통수학1 기출편',      weekday:'thu', slot:'2부'},
  {id:'c6', name:'고1A Z5', subject:'공통수학2 일등급만들기', weekday:'fri', slot:'1부'},
  {id:'c7', name:'고1A A5', subject:'공통수학1 기출편',      weekday:'fri', slot:'2부'},
  {id:'c8', name:'고2 세마', subject:'확통 자체교재',         weekday:'sat', slot:'1부'},
  {id:'c9', name:'고1S B4', subject:'공통수학1 기출편',      weekday:'sat', slot:'2부'},
  {id:'c10',name:'고1T A1', subject:'공통수학1 기출편',      weekday:'sat', slot:'3부'},
  {id:'c11',name:'고1A B5', subject:'공통수학1 기출편',      weekday:'sun', slot:'1부'},
  {id:'c12',name:'고1T A2', subject:'공통수학1 기출편',      weekday:'sun', slot:'2부'},
  {id:'c13',name:'고1T Y3', subject:'공통수학1 유형편',      weekday:'sun', slot:'3부'}
];
let CLASSES=[];
async function loadClasses(){
  let snap=await db.collection('classes').get();
  if(snap.empty){
    const batch=db.batch();
    DEFAULT_CLASSES.forEach((c,i)=>{
      batch.set(db.collection('classes').doc(c.id),{name:c.name,subject:c.subject,weekday:c.weekday,slot:c.slot,startTime:'',endTime:'',type:'정규',order:i});
    });
    await batch.commit();
    snap=await db.collection('classes').get();
  }
  CLASSES=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.order!=null?a.order:99)-(b.order!=null?b.order:99));
}
async function addClassFS(data){ await db.collection('classes').add(data); await loadClasses(); }
async function updateClassFS(id,upd){ await db.collection('classes').doc(id).update(upd); await loadClasses(); }
async function deleteClassFS(id){ await db.collection('classes').doc(id).delete(); await loadClasses(); }

// ===== 학생 명단: Firebase Firestore에서 불러옴 (캐시) =====
let STUDENTS_CACHE=[];
async function loadStudents(){
  const snap=await db.collection('students').orderBy('name').get();
  STUDENTS_CACHE=snap.docs.map(d=>({id:d.id, ...d.data()}));
}
function getStudents(){return STUDENTS_CACHE;}
function getStudentsByClass(cid){return STUDENTS_CACHE.filter(s=>Array.isArray(s.classIds)?s.classIds.includes(cid):s.classId===cid);}
function classNamesOf(s){ return Array.isArray(s.classNames)&&s.classNames.length ? s.classNames : (s.className?[s.className]:[]); }

// 학생 추가/삭제 → Firebase에 저장 (회원가입 없이 선생님이 직접 등록)
async function addStudentFS(data){ await db.collection('students').add(data); await loadStudents(); }
async function deleteStudentFS(id){ await db.collection('students').doc(id).delete(); await loadStudents(); }

// ===== 숙제(과제)·제출 = Firebase 공유 (선생님이 올리면 학생이 봄) =====
let ASSIGNMENTS_CACHE=[], SUBMISSIONS_CACHE=[];
async function loadAssignments(){ const s=await db.collection('assignments').get(); ASSIGNMENTS_CACHE=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||'')); }
async function loadSubmissions(){ const s=await db.collection('submissions').get(); SUBMISSIONS_CACHE=s.docs.map(d=>({id:d.id,...d.data()})); }
function getAssignments(){return ASSIGNMENTS_CACHE;}
function getSubmissions(){return SUBMISSIONS_CACHE;}
function getSubsByAssignment(aid){return SUBMISSIONS_CACHE.filter(s=>s.assignmentId===aid);}
async function saveAssignment(d){ d.createdAt=new Date().toISOString().slice(0,10); await db.collection('assignments').add(d); await loadAssignments(); }
async function updateSub(sid,u){ await db.collection('submissions').doc(sid).update(u); await loadSubmissions(); }

// ===== 그 외 데이터는 아직 이 브라우저에만 저장돼요 (다음 단계에서 Firebase로) =====
// ===== 출석·성적 = Firebase 공유 (선생님↔학생) =====
let ATTENDANCE_CACHE=[], EXAMS_CACHE=[], EXAMSUBS_CACHE=[];
async function loadAttendance(){ const s=await db.collection('attendance').get(); ATTENDANCE_CACHE=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.date||'').localeCompare(a.date||'')); }
async function loadExams(){ const s=await db.collection('exams').get(); EXAMS_CACHE=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.date||'').localeCompare(a.date||'')); }
async function loadExamSubs(){ const s=await db.collection('examSubs').get(); EXAMSUBS_CACHE=s.docs.map(d=>({id:d.id,...d.data()})); }
function getAttendance(){return ATTENDANCE_CACHE;}
function getExams(){return EXAMS_CACHE;}
function getExamSubs(){return EXAMSUBS_CACHE;}
async function saveAttendance(d){ await db.collection('attendance').doc(d.date+'_'+d.classId).set(d); await loadAttendance(); }

// ===== AI 시험지 분석 (사진 → 단원·능력·난이도) =====
function fileToBase64(file){ return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result).split(',')[1]);r.onerror=rej;r.readAsDataURL(file);}); }
function compressImage(file,maxDim=1280,q=0.72){ return new Promise((resolve,reject)=>{const img=new Image(),url=URL.createObjectURL(file);img.onload=()=>{let w=img.width,h=img.height;if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}else if(h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);let d;try{d=c.toDataURL('image/jpeg',q);}catch(e){URL.revokeObjectURL(url);return reject(e);}URL.revokeObjectURL(url);resolve({base64:d.split(',')[1],mime:'image/jpeg'});};img.onerror=reject;img.src=url;}); }
async function doAnalyzeExam(){
  const fi=document.getElementById('an-photo');
  if(!fi||!fi.files||!fi.files[0]){ showToast('시험지 사진을 선택해주세요','error'); return; }
  const out=document.getElementById('an-result');
  out.innerHTML='<div style="padding:16px;color:var(--text-muted)">🤖 시험지를 분석하는 중이에요... (10~20초 걸려요)</div>';
  let img; try{ img=await compressImage(fi.files[0]); }catch(e){ try{ img={base64:await fileToBase64(fi.files[0]),mime:fi.files[0].type}; }catch(e2){ out.innerHTML='<div style="color:var(--red)">사진 처리 실패</div>'; return; } }
  try{
    const res=await fetch('/.netlify/functions/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({imageBase64:img.base64,imageMime:img.mime})});
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||'오류');
    renderAnalysis(data);
  }catch(e){
    const msg=(e&&e.message)||'';
    const fr = /quota|exhausted|resource|rate.?limit|billing/i.test(msg) ? 'AI 무료 사용량을 잠깐 초과했어요. 30초~1분 후 다시 시도해주세요.'
             : /demand|overload|503|UNAVAILABLE|try again/i.test(msg) ? 'AI가 잠시 바빠요. 잠시 후 다시 시도해주세요.'
             : ('분석 실패: '+msg);
    out.innerHTML='<div style="color:var(--text-muted)">⚠️ '+fr+'</div>';
  }
}
function renderAnalysis(data){
  const out=document.getElementById('an-result');
  const probs=(data&&data.problems)||[];
  if(!probs.length){ out.innerHTML='<div style="color:var(--text-muted);padding:12px">'+((data&&data.summary)||'문제를 읽지 못했어요. 더 선명한 사진으로 다시 시도해주세요.')+'</div>'; return; }
  const counts={}; probs.forEach(p=>{const a=p.ability||'기타';counts[a]=(counts[a]||0)+1;});
  const total=probs.length;
  const comp=Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([a,c])=>`<span class="badge b-primary" style="margin:2px">${a} ${Math.round(c/total*100)}%</span>`).join('');
  out.innerHTML=`
    <div style="background:var(--primary-light);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:12px;font-size:13px;color:var(--primary-dark)">📊 ${data.summary||''}</div>
    <div style="margin-bottom:10px">${comp}</div>
    <div class="table-wrap"><table>
      <thead><tr><th>번호</th><th>단원</th><th>요구 능력</th><th>난이도</th></tr></thead>
      <tbody>${probs.map(p=>`<tr><td><strong>${p.no||'-'}</strong></td><td>${p.unit||'-'}</td><td><span class="badge b-primary">${p.ability||'-'}</span></td><td>${p.difficulty||'-'}</td></tr>`).join('')}</tbody>
    </table></div>
    <div style="font-size:11px;color:var(--text-muted);margin-top:8px">⚠️ AI 분석이라 가끔 부정확할 수 있어요. 참고용으로 봐주세요.</div>`;
}

async function doAddSt(){
  const name=document.getElementById('ns-name').value.trim();

  if(target)target.className=`att-btn ${map[st]}`;
  const m=document.getElementById(`amin-${sid}`);if(m)m.style.display=st==='late'?'block':'none';

        const min=clsSubs.length?Math.min(...clsSubs.map(s=>s.score)):null;
        return`<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span class="chip">${cls.name}</span>
            ${avg!=null?`<span style="font-size:13px;color:var(--text-muted)">평균 <strong style="color:var(--primary)">${avg}점</strong> · 최고 ${max}점 · 최저 ${min}점</span>`:'<span style="font-size:12px;color:var(--text-muted)">데이터 없음</span>'}
          </div></div>`;}).join('')}
    </div>
    <div class="card">
      <div class="card-title">개인별 성적</div>
      <div class="table-wrap"><table>
        <thead><tr><th>학생</th><th>반</th>${exams.slice(0,3).map(e=>`<th>${e.title}</th>`).join('')}</tr></thead>
        <tbody>${getStudents().map(st=>`<tr><td><strong>${st.name}</strong></td><td><span class="chip">${st.className}</span></td>${exams.slice(0,3).map(e=>{const s=esubs.find(x=>x.studentId===st.id&&x.examId===e.id);return`<td>${s?.score!=null?`<strong>${s.score}점</strong>`:'<span style="color:var(--text-muted)">-</span>'}</td>`;}).join('')}</tr>`).join('')}</tbody>
      </table></div>
    </div>`;
}

function renderDirectScores(){
  const examId=document.getElementById('ds-exam').value;

  if(!examId){ el.innerHTML=''; return; }
  const exam=getExams().find(e=>e.id===examId); if(!exam){ el.innerHTML=''; return; }
  const sts=getStudentsByClass(exam.classId), esubs=getExamSubs();
  el.innerHTML = sts.length ? `

      <tbody>${sts.map(st=>{ const es=esubs.find(s=>s.examId===examId&&s.studentId===st.id); return `
        <tr>

  : '<div style="color:var(--text-muted);padding:12px">이 반에 배정된 학생이 없어요</div>';
}
async function upsertExamScore(exam, student, score, comment){
  const existing=getExamSubs().find(s=>s.examId===exam.id && s.studentId===student.id);
  if(existing){ await db.collection('examSubs').doc(existing.id).update({score, comment}); }
  else{ await db.collection('examSubs').add({ examId:exam.id, examTitle:exam.title, classId:exam.classId, className:exam.className, studentId:student.id, studentName:student.name, submittedAt:new Date().toLocaleString('ko-KR'), score, comment }); }
  await loadExamSubs();
}
async function doSaveDirect(examId, studentId){
  const exam=getExams().find(e=>e.id===examId), st=getStudents().find(s=>s.id===studentId);
  const v=document.getElementById('ds-sc-'+studentId).value;
  if(v===''){ showToast('점수를 입력해주세요','error'); return; }
  try{ await upsertExamScore(exam, st, parseInt(v), document.getElementById('ds-cm-'+studentId).value.trim()); showToast(`${st.name} ${parseInt(v)}점 저장 ✓`,'success'); }
  catch(e){ showToast('저장 실패: '+e.message,'error'); }
}
async function doSaveAllDirect(examId){
  const exam=getExams().find(e=>e.id===examId), sts=getStudentsByClass(exam.classId);
  let n=0;
  try{
    for(const st of sts){ const v=document.getElementById('ds-sc-'+st.id).value; if(v==='')continue; await upsertExamScore(exam, st, parseInt(v), document.getElementById('ds-cm-'+st.id).value.trim()); n++; }
    showToast(`${n}명 점수 저장 완료 🏆`,'success'); renderDirectScores();
  }catch(e){ showToast('저장 실패: '+e.message,'error'); }
}

function rQuestions(){
  const qs=getQuestions();
  const pending=qs.filter(q=>q.status!=='answered'),answered=qs.filter(q=>q.status==='answered');
  const qBadge=s=>({answered:'<span class="badge b-green">답변 완료</span>',ai_draft:'<span class="badge b-primary">AI 초안</span>',pending:'<span class="badge b-gray">답변 대기</span>'}[s]||'');
  function qCard(q){return`
    <div class="q-card">
      <div class="q-head">
        <div><strong>${q.studentName}</strong><span class="chip" style="margin-left:6px">${q.className}</span><span style="margin-left:8px;font-size:12px;color:var(--text-muted)">📖 ${q.textbook} p.${q.page} ${q.number}</span></div>
        <div style="display:flex;align-items:center;gap:8px"><span style="font-size:11px;color:var(--text-muted)">${q.createdAt}</span>${qBadge(q.status)}</div>
      </div>
      ${q.aiHint?`<div style="padding:14px 18px;background:#EFF6FF;border-bottom:1px solid #BFDBFE"><div style="font-size:12px;font-weight:700;color:#2563EB;margin-bottom:6px">🤖 AI 힌트 (데모)</div><p style="font-size:13px;color:#1E40AF;line-height:1.7">${q.aiHint}</p></div>`:''}
      ${q.teacherAnswer?`<div style="padding:14px 18px;background:var(--green-light)"><div style="font-size:12px;font-weight:700;color:var(--green);margin-bottom:6px">👩‍🏫 내 답변</div><p style="font-size:13px;color:#065F46;line-height:1.7">${q.teacherAnswer}</p></div>`:`
        <div style="padding:14px 18px;background:var(--bg)">
          <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:8px">답변 작성</div>
          <textarea class="form-textarea" id="ans-${q.id}" style="min-height:70px" placeholder="학생에게 답변을 남겨주세요..."></textarea>
          <button class="btn btn-green btn-sm" style="margin-top:8px" onclick="doAns('${q.id}')">답변 저장</button>
        </div>`}
    </div>`;}
  document.getElementById('questionsContent').innerHTML=`
    ${pending.length?`<div class="sec-label" style="color:var(--red)">⚠️ 답변 필요 (${pending.length})</div>${pending.map(qCard).join('')}`:''}
    ${answered.length?`<div class="sec-label">✅ 답변 완료 (${answered.length})</div>${answered.map(qCard).join('')}`:''}
    ${!qs.length?'<div class="card" style="text-align:center;padding:40px;color:var(--text-muted)">질문이 없어요 🎉</div>':''}`;
}
function doAns(qid){
  const ans=document.getElementById('ans-'+qid)?.value.trim();

  answerQ(qid,ans);showToast('답변이 저장되었어요! 💬','success');rQuestions();
}

  document.getElementById('consultationContent').innerHTML=`
    <div class="card"><div class="table-wrap"><table>
      <thead><tr><th>학생</th><th>상담유형</th><th>방식</th><th>희망시간</th><th>접수일</th><th>상태</th><th>관리</th></tr></thead>
      <tbody>${cs.map(c=>`
        <tr>
          <td><strong>${c.studentName}</strong><br><span style="font-size:11px;color:var(--text-muted)">${c.className||''}</span></td>
          <td>${c.type}</td><td>${c.method}</td>
          <td>${c.time||'-'}</td>
          <td style="color:var(--text-muted);font-size:12px">${c.submittedAt}</td>
          <td>${csBadge(c.status)}</td>
          <td>
            <div class="btn-row">
              ${c.status==='pending'?`<button class="btn btn-outline btn-sm" onclick="doCSUpdate('${c.id}','checked')">확인</button>`:''}
              ${c.status==='checked'?`<button class="btn btn-green btn-sm" onclick="doCSUpdate('${c.id}','done')">완료</button>`:''}
              <button class="btn btn-outline btn-sm" onclick="toggleCSDetail('${c.id}')">메모</button>
            </div>
          </td>
        </tr>
        <tr id="csd-${c.id}" style="display:none">
          <td colspan="7" style="background:var(--bg);padding:12px 16px">
            ${c.note?`<div style="font-size:13px;margin-bottom:10px"><strong>학생 메모:</strong> ${c.note}</div>`:''}
            <div style="display:flex;gap:8px;align-items:flex-end">
              <div style="flex:1"><label class="form-label" style="font-size:12px">내부 메모 (비공개)</label><input class="form-input" id="csm-${c.id}" value="${c.memo||''}" placeholder="내부 메모"></div>
              <button class="btn btn-primary btn-sm" onclick="doCSMemo('${c.id}')">저장</button>
            </div>
          </td>
        </tr>`).join('')}
      </tbody>
    </table></div></div>`;
}
function toggleCSDetail(id){const r=document.getElementById('csd-'+id);if(r)r.style.display=r.style.display==='none'?'table-row':'none';}
function doCSUpdate(id,st){updateConsult(id,{status:st});showToast({checked:'확인 처리했어요',done:'상담이 완료되었어요!'}[st],'success');rConsultation();}
function doCSMemo(id){updateConsult(id,{memo:document.getElementById('csm-'+id)?.value.trim()});showToast('메모가 저장되었어요','success');}

// ================================================================
// REPORT
// ================================================================
let rpStId='';
function rReport(){
  const sts=getStudents(),reports=getReports(),sel=sts.find(s=>s.id===rpStId),existing=reports.find(r=>r.studentId===rpStId);
  document.getElementById('reportContent').innerHTML=`
    <div class="card">
      <div class="card-title">📊 학생별 리포트 작성</div>
      <div class="form-group">
        <label class="form-label">학생 선택</label>
        <select class="form-select" onchange="rpStId=this.value;rReport()" style="max-width:300px">
          <option value="">학생을 선택하세요</option>
          ${sts.map(s=>`<option value="${s.id}" ${s.id===rpStId?'selected':''}>${s.name} (${s.className})</option>`).join('')}
        </select>
      </div>
    </div>
    ${sel?`
      <div class="card">
        <div class="card-title">📈 ${sel.name} 학습 지표 (자동 계산)</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">
          <div class="rp-stat"><div class="rp-val">82%</div><div class="rp-lbl">숙제 제출률</div></div>
          <div class="rp-stat"><div class="rp-val">75%</div><div class="rp-lbl">오답 완료율</div></div>
          <div class="rp-stat"><div class="rp-val">90%</div><div class="rp-lbl">출석률</div></div>
          <div class="rp-stat"><div class="rp-val">88점</div><div class="rp-lbl">최근 성적</div></div>
        </div>
        <div class="form-group"><label class="form-label">혜빈쌤 코멘트 ✍️</label><textarea class="form-textarea" id="rp-comment" style="min-height:120px" placeholder="학생에게 남기는 종합 피드백...">${existing?.teacherComment||''}</textarea></div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="doSaveRp()">💾 리포트 완성하기</button>
        </div>
        <div style="margin-top:10px;font-size:12px;color:var(--text-muted)">💡 리포트 완성 시 학생 포털 "학습 리포트" 탭에 반영됩니다.</div>
      </div>
      ${existing?`<div class="card" style="background:var(--green-light);border:1px solid var(--green)"><div class="card-title" style="color:var(--green)">✅ 저장된 리포트</div><p style="font-size:13px;color:#065F46;line-height:1.7">${existing.teacherComment}</p><div style="font-size:11px;color:var(--green);margin-top:8px">저장일: ${existing.savedAt}</div></div>`:''}`:''}`;
}
function doSaveRp(){
  if(!rpStId){showToast('학생을 선택해주세요','error');return;}
  const comment=document.getElementById('rp-comment')?.value.trim();
  if(!comment){showToast('코멘트를 입력해주세요','error');return;}
  saveReport({studentId:rpStId,teacherComment:comment,savedAt:new Date().toLocaleString('ko-KR')});
  showToast('리포트가 저장되었어요! 학생 포털에 반영됩니다 📊','success');rReport();
}

// ================================================================
// INIT
// ================================================================
// 로그아웃 — Firebase 로그아웃 + 세션 지우고 로그인 페이지로
function logout(){
  if(!confirm('로그아웃 할까요?'))return;
  ['bm_role','bm_email','bm_uid','bm_demo','bm_studentId','bm_studentName','bm_classId','bm_classIds','bm_className'].forEach(k=>localStorage.removeItem(k));
  location.href='index.html';
}

async function init(){
  requireRole('teacher');   // 선생님 아니면 로그인 페이지로
  document.getElementById('todayDate').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  buildSidebar();
  try{
    await loadClasses();         // 반 목록 (없으면 13개 자동 생성)
    await loadStudents();        // 학생 명단
    await loadAssignments();     // 숙제(과제)
    await loadSubmissions();     // 제출 현황
    await loadAttendance();      // 출석
    await loadExams();           // 시험
    await loadExamSubs();        // 답안지/점수
  }catch(e){ showToast('데이터를 불러오지 못했어요: '+e.message,'error'); }
  rDashboard();
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
